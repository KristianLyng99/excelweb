<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>{{ filename }}</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="container py-5">
    <h1 class="mb-4">{{ filename }}</h1>
    <div class="mb-3">
        <a class="btn btn-secondary" href="{{ url_for('excelweb.download', filename=filename) }}">Download</a>
        <a class="btn btn-link" href="{{ url_for('excelweb.index') }}">Back</a>
    </div>
    {{ table|safe }}
</body>
</html>
