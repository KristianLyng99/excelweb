<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Excel Web</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="container py-5">
    <h1 class="mb-4">Available Spreadsheets</h1>
    <ul class="list-group">
    {% for file in files %}
        <li class="list-group-item d-flex justify-content-between align-items-center">
            <a href="{{ url_for('excelweb.sheet', filename=file) }}">{{ file }}</a>
            <a href="{{ url_for('excelweb.download', filename=file) }}" class="btn btn-sm btn-secondary">Download</a>
        </li>
    {% else %}
        <li class="list-group-item">No spreadsheets found.</li>
    {% endfor %}
    </ul>
</body>
</html>
